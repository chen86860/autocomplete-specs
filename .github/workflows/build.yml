name: Build and release specs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Allow the default GITHUB_TOKEN to create tags/releases and push the version bump.
# id-token is required for npm Trusted Publishing with provenance.
permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
        # Install all dependencies
      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.1.0 --activate
          pnpm --version
      - name: install
        run: pnpm install --frozen-lockfile
        # Transpile all specs from ts to js
      - name: build
        run: pnpm build
        # Zip the transpiled files into the specs.zip file
      - name: bundle files
        run: |
          mv build/ specs/
          mv icons/ specs/
          zip -r specs.zip specs/
          mv specs/ build/
          mv build/icons icons
        # Bump the version and create a git tag with the new version
      - name: Bump version and push tag
        id: tag_version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags
          latest_tag="$(git tag --list 'spec-build-number-[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [[ -z "$latest_tag" ]]; then
            previous_version="0.0.0"
          else
            previous_version="${latest_tag#spec-build-number-}"
          fi

          IFS=. read -r major minor _patch <<< "$previous_version"
          new_version="${major}.$((minor + 1)).0"
          new_tag="spec-build-number-${new_version}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$new_tag"
          git push origin "refs/tags/$new_tag"

          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
        # Create a new github release with the newly created specs.zip file
      - name: Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: specs.zip
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to npm
        shell: bash
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "${package_name}@${package_version} is already published; skipping npm publish."
          else
            npm publish --provenance --access public
          fi
