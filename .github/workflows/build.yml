name: Build and release specs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Allow the default GITHUB_TOKEN to create tags/releases and push the version bump.
# id-token is required for npm Trusted Publishing with provenance.
permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
        # Install all dependencies
      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.1.0 --activate
          pnpm --version
      - name: install
        run: pnpm install --frozen-lockfile
        # Transpile all specs from ts to js
      - name: build
        run: pnpm build
      - name: Read package metadata
        id: package
        shell: bash
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          release_tag="v${package_version}"

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME}" != "${release_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${package_version}; expected ${release_tag}." >&2
            exit 1
          fi

          echo "name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "archive=autocomplete-specs-${package_version}.zip" >> "$GITHUB_OUTPUT"
      - name: Bundle built package files
        run: |
          set -euo pipefail

          archive_root="autocomplete-specs-${{ steps.package.outputs.version }}"
          rm -rf "${archive_root}" "${{ steps.package.outputs.archive }}"
          mkdir -p "${archive_root}"

          cp -R build "${archive_root}/build"
          cp -R icons "${archive_root}/icons"
          cp package.json README.md "${archive_root}/"

          zip -r "${{ steps.package.outputs.archive }}" "${archive_root}"
        # Create a new github release with the current package version and built archive.
      - name: Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: ${{ steps.package.outputs.archive }}
          tag_name: ${{ steps.package.outputs.tag }}
          name: ${{ steps.package.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to npm
        shell: bash
        run: |
          set -euo pipefail

          package_name="${{ steps.package.outputs.name }}"
          package_version="${{ steps.package.outputs.version }}"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "${package_name}@${package_version} is already published; skipping npm publish."
          else
            npm publish --provenance --access public
          fi
